workflows:
  ios-dev-build:
    name: iOS Dev Build (No Signing)
    max_build_duration: 60
    environment:
      flutter: 3.38.9
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS (no code signing)
        script: |
          # flutter build ios handles pod install internally
          # || true: xcode build succeeds but flutter post-check fails on signing — ignore it
          flutter build ios --release --no-codesign || true

          # Verify the .app was actually built
          if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            echo "ERROR: Runner.app not found — xcode build may have failed"
            exit 1
          fi
          echo "Runner.app built successfully"

      - name: Package unsigned IPA
        script: |
          mkdir -p build/ios/unsigned
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../unsigned/kyogen-unsigned.ipa Payload/
          echo "IPA created: build/ios/unsigned/kyogen-unsigned.ipa"

    artifacts:
      - build/ios/unsigned/kyogen-unsigned.ipa

    publishing:
      email:
        recipients:
          - chenyl25123@gmail.com
        notify:
          success: true
          failure: true
