workflows:
  ios-dev-build:
    name: iOS Dev Build (No Signing)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: cd ios && pod install

      - name: Build iOS app (no code signing)
        script: |
          # Try flutter first (handles Dart compilation cleanly)
          flutter build ios --release --no-codesign 2>&1 || true

          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "Flutter build succeeded"
          else
            echo "Flutter build did not produce .app, using xcodebuild directly..."

            # Use xcodebuild build (not archive) with derivedDataPath
            xcodebuild \
              -workspace ios/Runner.xcworkspace \
              -scheme Runner \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              build

            # App is at DerivedData/Build/Products/Release-iphoneos/
            APP_PATH=$(find "$CM_BUILD_DIR/DerivedData" -name "Runner.app" -type d | head -1)
            if [ -z "$APP_PATH" ]; then
              echo "ERROR: Runner.app not found anywhere in DerivedData"
              find "$CM_BUILD_DIR/DerivedData" -name "*.app" -type d 2>/dev/null | head -5
              exit 1
            fi
            echo "Found at: $APP_PATH"
            mkdir -p build/ios/iphoneos
            cp -r "$APP_PATH" build/ios/iphoneos/Runner.app
          fi

          echo "SUCCESS: Runner.app is ready"

      - name: Package unsigned IPA
        script: |
          mkdir -p build/ios/unsigned
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../unsigned/kyogen-unsigned.ipa Payload/
          echo "IPA packaged: build/ios/unsigned/kyogen-unsigned.ipa"

    artifacts:
      - build/ios/unsigned/kyogen-unsigned.ipa

    publishing:
      email:
        recipients:
          - chenyl25123@gmail.com
        notify:
          success: true
          failure: true
