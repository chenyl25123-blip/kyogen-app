workflows:
  ios-dev-build:
    name: iOS Dev Build (No Signing)
    max_build_duration: 60
    environment:
      flutter: 3.38.9
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS (no code signing)
        script: |
          flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        script: |
          mkdir -p build/ios/unsigned
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../unsigned/kyogen-unsigned.ipa Payload

    artifacts:
      - build/ios/unsigned/kyogen-unsigned.ipa

    publishing:
      email:
        recipients:
          - chenyl25123@gmail.com
        notify:
          success: true
          failure: true
